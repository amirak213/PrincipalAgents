<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dourbia - Location de Voitures</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
    <link rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
  <style>
    /* ═══════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════ */
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96d;
      --gold-dim: #8a6f32;
      --gold-glow: rgba(201, 168, 76, .12);
      --dark: #0b0b0f;
      --dark2: #13131a;
      --surface: #18181f;
      --surface2: #1f1f28;
      --surface3: #252531;
      --text: #e8e4d8;
      --text-dim: #8a8578;
      --text-muted: #4a4740;
      --border: #252530;
      --border-soft: #1e1e28;
      --user-bg: #1a2035;
      --user-border: #252d45;
      --green: #3ecf6e;
      --red: #e74c3c;
      --radius: 14px;
      --radius-sm: 9px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════
   LAYOUT PRINCIPAL
═══════════════════════════════════════════ */
    .app {
      display: grid;
      grid-template-rows: 64px 1fr auto;
      height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: var(--dark2);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      opacity: .4;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      background: linear-gradient(145deg, var(--gold-dim), var(--gold));
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      color: #0b0b0f;
      box-shadow: 0 0 18px rgba(201, 168, 76, .25);
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 3px;
      color: var(--text);
    }

    .logo-sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .badge strong {
      color: var(--gold-light);
      font-weight: 500;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: blink 2.4s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* ═══════════════════════════════════════════
   ZONE CHAT
═══════════════════════════════════════════ */
    .chat-area {
      overflow-y: auto;
      padding: 20px 0 12px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar {
      width: 3px;
    }

    .chat-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .messages-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* ═══════════════════════════════════════════
   ÉCRAN DE BIENVENUE
═══════════════════════════════════════════ */
    .welcome {
      text-align: center;
      padding: 32px 16px 24px;
      max-width: 540px;
      margin: 0 auto 16px;
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(138, 111, 50, .15), rgba(201, 168, 76, .2));
      border: 1px solid rgba(138, 111, 50, .3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      font-size: 28px;
      box-shadow: 0 0 30px rgba(201, 168, 76, .06);
    }

    .welcome h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 8px;
      letter-spacing: .5px;
      color: var(--text);
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.75;
    }

    .stats-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      transition: border-color .2s;
    }

    .stat-chip:hover {
      border-color: var(--gold-dim);
    }

    .stat-chip strong {
      display: block;
      font-size: 17px;
      color: var(--gold-light);
      font-weight: 600;
      margin-bottom: 2px;
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 18px;
    }

    .q-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .2s;
      font-family: 'DM Sans', sans-serif;
    }

    .q-btn:hover {
      border-color: var(--gold-dim);
      color: var(--gold-light);
      background: var(--surface2);
      box-shadow: 0 0 12px rgba(201, 168, 76, .08);
    }

    /* ═══════════════════════════════════════════
   SÉPARATEUR DATE
═══════════════════════════════════════════ */
    .date-sep {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 4px 0;
    }

    .date-sep::before,
    .date-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }

    /* ═══════════════════════════════════════════
   MESSAGES
═══════════════════════════════════════════ */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: msg-in .2s ease-out both;
    }

    @keyframes msg-in {
      from {
        opacity: 0;
        transform: translateY(5px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: 2px;
      font-size: 13px;
      font-weight: 600;
    }

    .avatar.bot {
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: #0b0b0f;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      box-shadow: 0 0 10px rgba(201, 168, 76, .2);
    }

    .avatar.user {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      color: var(--text-dim);
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.7;
      white-space: normal;
      word-break: break-word;
    }

    .msg-row.bot .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      color: var(--text);
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 3px;
      color: var(--text);
    }

    /* Heure */
    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
      text-align: right;
    }

    .msg-row.bot .msg-time {
      text-align: left;
    }

    /* ═══════════════════════════════════════════
   TYPING INDICATOR
═══════════════════════════════════════════ */
    .typing-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      animation: msg-in .2s ease-out both;
    }

    .typing-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: tdot 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: .2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes tdot {

      0%,
      80%,
      100% {
        transform: translateY(0);
        background: var(--text-muted);
      }

      40% {
        transform: translateY(-6px);
        background: var(--gold-dim);
      }
    }

    /* ═══════════════════════════════════════════
   ZONE DE SAISIE
═══════════════════════════════════════════ */
    .input-wrap {
      background: var(--dark2);
      border-top: 1px solid var(--border);
      padding: 14px 24px 20px;
    }

    .input-wrap::before {
      content: '';
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(138, 111, 50, .25), transparent);
      margin-bottom: 14px;
      margin-top: -14px;
    }

    .input-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea.input-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      resize: none;
      min-height: 48px;
      max-height: 140px;
      overflow-y: auto;
      line-height: 1.55;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    textarea.input-box::placeholder {
      color: var(--text-muted);
    }

    textarea.input-box:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(138, 111, 50, .08);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(145deg, var(--gold-dim), var(--gold));
      color: #0b0b0f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(201, 168, 76, .2);
    }

    .send-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 4px 18px rgba(201, 168, 76, .3);
    }

    .send-btn:active {
      transform: scale(.97);
    }

    .send-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .send-btn svg {
      width: 17px;
      height: 17px;
    }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: .3px;
    }

    /* ═══════════════════════════════════════════
   CONFIG SERVEUR (bandeau discret)
═══════════════════════════════════════════ */
    .server-bar {
      background: rgba(138, 111, 50, .08);
      border: 1px solid rgba(138, 111, 50, .2);
      border-radius: var(--radius-sm);
      padding: 8px 14px;
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto 12px;
    }

    .server-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text);
      outline: none;
      font-family: monospace;
    }

    .server-bar input:focus {
      border-color: var(--gold-dim);
    }

    .server-bar label {
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
    @media (max-width: 600px) {
      header {
        padding: 0 16px;
      }

      .badge {
        display: none;
      }

      .messages-wrap {
        padding: 0 14px;
      }

      .input-wrap {
        padding: 10px 14px 16px;
      }

      .bubble {
        max-width: 88%;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- ══════════ HEADER ══════════ -->
    <header>
      <div class="logo">
        <div class="logo-mark">D</div>
        <div>
          <div class="logo-text">DOURBIA</div>
          <div class="logo-sub">Location de voitures</div>
        </div>
      </div>
      <div class="header-right">
        <div class="badge" id="fleetBadge">Flotte · <strong>—</strong></div>
        <div class="status-pill" id="statusPill">
          <div class="dot" id="statusDot" style="background:#4a4740;box-shadow:none"></div>
          <span id="statusText">Connexion...</span>
        </div>
      </div>
    </header>

    <!-- ══════════ CHAT ══════════ -->
    <div class="chat-area" id="chatArea">
      <div class="messages-wrap" id="messages">

        <!-- Bienvenue -->
        <div class="welcome" id="welcomeBlock">
          <div class="welcome-icon">🚗</div>
          <h2>Bienvenue chez Dourbia</h2>
          <p>Votre agent de location disponible 24h/24.<br>Flotte de <strong>200 véhicules</strong> dans 10 villes
            tunisiennes.</p>
          <div class="stats-row" id="statsRow">
            <div class="stat-chip"><strong>200</strong>Véhicules</div>
            <div class="stat-chip"><strong id="dispoStat">—</strong>Disponibles</div>
            <div class="stat-chip"><strong>10</strong>Villes</div>
            <div class="stat-chip"><strong>7</strong>Catégories</div>
          </div>
          <div class="quick-actions">
            <button class="q-btn" onclick="sendQuick('Je veux une voiture économique')">💰 Économique</button>
            <button class="q-btn" onclick="sendQuick('Je veux une voiture électrique')">⚡ Électrique</button>
            <button class="q-btn" onclick="sendQuick('Je veux un 4x4 pour le désert')">🏜️ Désert</button>
            <button class="q-btn" onclick="sendQuick('Je veux une voiture de luxe')">💎 Luxe</button>
            <button class="q-btn" onclick="sendQuick('Voitures disponibles à Tunis')">📍 Tunis</button>
            <button class="q-btn" onclick="sendQuick('Voitures disponibles à Djerba')">🏝️ Djerba</button>
            <button class="q-btn" onclick="sendQuick('Consulter mes réservations')">📋 Mes réservations</button>
            <button class="q-btn" onclick="sendQuick('Statistiques de la flotte')">📊 Statistiques</button>
          </div>
        </div>

        <div class="date-sep" id="todaySep">Aujourd'hui</div>

      </div>
    </div>

    <!-- ══════════ INPUT ══════════ -->
    <div class="input-wrap">
      <div class="server-bar">
        <label>🔗 API :</label>
        <input type="text" id="serverUrl" value="http://localhost:5000" placeholder="http://localhost:5000" />
      </div>
      <div class="input-inner">
        <textarea class="input-box" id="userInput" placeholder="Écrivez votre message..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Envoyer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
      <div class="input-hint">Entrée pour envoyer · Maj+Entrée pour nouvelle ligne</div>
    </div>

  </div>

  <script>
    /* ═══════════════════════════════════════════
       ÉTAT
    ═══════════════════════════════════════════ */
    var SESSION_ID = "session_" + Math.random().toString(36).slice(2, 11);
    var loading = false;

    var messagesEl = document.getElementById("messages");
    var chatArea = document.getElementById("chatArea");
    var inputEl = document.getElementById("userInput");
    var sendBtn = document.getElementById("sendBtn");
    var serverUrlEl = document.getElementById("serverUrl");

    /* ─── URL du backend ─── */
    function getApiBase() {
      return (serverUrlEl.value || "http://localhost:5000").replace(/\/$/, "");
    }

    /* ─── Auto-resize textarea ─── */
    inputEl.addEventListener("input", function () {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
    });

    inputEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    /* ═══════════════════════════════════════════
       SCROLL
    ═══════════════════════════════════════════ */
    function scrollDown() {
      setTimeout(function () { chatArea.scrollTop = chatArea.scrollHeight; }, 60);
    }

    /* ═══════════════════════════════════════════
       HEURE
    ═══════════════════════════════════════════ */
    function nowHHMM() {
      var d = new Date();
      return d.getHours().toString().padStart(2, "0") + ":" +
        d.getMinutes().toString().padStart(2, "0");
    }

    /* ═══════════════════════════════════════════
       AJOUTER UN MESSAGE
    ═══════════════════════════════════════════ */
    function renderMarkdown(text) {
        return text
          // Liens [texte](url)
          .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
            '<a href="$2" target="_blank" rel="noopener" style="color:var(--gold-light);text-decoration:underline;text-underline-offset:3px;">$1</a>')
          // Gras **texte**
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          // Italique *texte*
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          // Lignes vides → paragraphes
          .replace(/\n\n+/g, '<br><br>')
          // Retours simples
          .replace(/\n/g, '<br>');
      }

      function addMessage(role, text) {
        var wrap = document.createElement("div");
        wrap.className = "msg-row " + role;

        var av = document.createElement("div");
        av.className = "avatar " + role;
        av.textContent = role === "bot" ? "D" : "U";

        var col = document.createElement("div");
        col.style.display = "flex";
        col.style.flexDirection = "column";
        col.style.maxWidth = "72%";

        var bubble = document.createElement("div");
        bubble.className = "bubble";

        // Bot → rendu markdown, User → texte brut (sécurité)
        if (role === "bot") {
          bubble.innerHTML = renderMarkdown(text);
        } else {
          bubble.textContent = text;
        }

        var time = document.createElement("div");
        time.className = "msg-time";
        time.textContent = nowHHMM();

        col.appendChild(bubble);
        col.appendChild(time);
        wrap.appendChild(av);
        wrap.appendChild(col);
        messagesEl.appendChild(wrap);
        scrollDown();
      }
    /* ═══════════════════════════════════════════
       TYPING INDICATOR
    ═══════════════════════════════════════════ */
    function showTyping() {
      var row = document.createElement("div");
      row.className = "typing-row";
      row.id = "typing";

      var av = document.createElement("div");
      av.className = "avatar bot";
      av.textContent = "D";

      var b = document.createElement("div");
      b.className = "typing-bubble";
      b.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      row.appendChild(av);
      row.appendChild(b);
      messagesEl.appendChild(row);
      scrollDown();
    }

    function hideTyping() {
      var el = document.getElementById("typing");
      if (el) el.remove();
    }

    /* ═══════════════════════════════════════════
       ÉTAT DU BOUTON
    ═══════════════════════════════════════════ */
    function setLoading(v) {
      loading = v;
      sendBtn.disabled = v;
      inputEl.disabled = v;
    }

    /* ═══════════════════════════════════════════
       ENVOI DU MESSAGE
    ═══════════════════════════════════════════ */
    async function sendMessage() {
      var text = inputEl.value.trim();
      if (!text || loading) return;

      inputEl.value = "";
      inputEl.style.height = "auto";
      addMessage("user", text);
      setLoading(true);
      showTyping();

      try {
        var res = await fetch(getApiBase() + "/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: SESSION_ID })
        });
        hideTyping();
        if (!res.ok) throw new Error("HTTP " + res.status);
        var data = await res.json();
        addMessage("bot", data.reply || "Pas de réponse.");
      } catch (e) {
        hideTyping();
        addMessage("bot",
          "❌ Impossible de joindre le serveur.\n\n" +
          "Vérifiez que agent_pg.py tourne sur " + getApiBase() +
          "\n\nErreur : " + e.message);
      }

      setLoading(false);
      inputEl.focus();
    }

    /* ═══════════════════════════════════════════
       BOUTONS RAPIDES
    ═══════════════════════════════════════════ */
    function sendQuick(text) {
      if (loading) return;
      inputEl.value = text;
      sendMessage();
    }

    /* ═══════════════════════════════════════════
       VÉRIFICATION CONNEXION + STATS
    ═══════════════════════════════════════════ */
    async function checkConnection() {
      var dot = document.getElementById("statusDot");
      var txt = document.getElementById("statusText");
      var badge = document.getElementById("fleetBadge");

      try {
        var res = await fetch(getApiBase() + "/api/flotte", { signal: AbortSignal.timeout(4000) });
        if (!res.ok) throw new Error();
        var data = await res.json();

        /* Connexion OK */
        dot.style.background = "var(--green)";
        dot.style.boxShadow = "0 0 6px var(--green)";
        txt.textContent = "En ligne";
        badge.innerHTML = "Flotte · <strong>" + data.disponibles + " dispo</strong>";

        /* Mettre à jour le compteur */
        var el = document.getElementById("dispoStat");
        if (el) el.textContent = data.disponibles;

      } catch (_) {
        dot.style.background = "var(--red)";
        dot.style.boxShadow = "0 0 6px var(--red)";
        txt.textContent = "Hors ligne";
        badge.innerHTML = "API non joignable";
      }
    }

    /* ═══════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════ */
    window.addEventListener("load", function () {
      /* Message de bienvenue initial */
      setTimeout(function () {
        addMessage("bot",
          "Bonjour ! 👋\n\n" +
          "Bienvenue chez Dourbia — location de voitures en Tunisie.\n\n" +
          "Notre flotte couvre 10 villes : Tunis, Sfax, Sousse, Hammamet, Nabeul, " +
          "Djerba, Monastir, Bizerte, Gabès et Kairouan.\n\n" +
          "Catégories disponibles : Économique, Confort, Familiale, Luxe, " +
          "Désert/Sahari, Électrique, Utilitaire.\n\n" +
          "Comment puis-je vous aider ?"
        );
      }, 500);

      checkConnection();
      /* Re-vérifier la connexion toutes les 30 s */
      setInterval(checkConnection, 300000);


      /* Re-vérifier si l'URL serveur est modifiée */
      serverUrlEl.addEventListener("change", checkConnection);

      inputEl.focus();
    });
  </script>
