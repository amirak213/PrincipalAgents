version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dourbia_db
    environment:
      POSTGRES_DB: dourbia
      POSTGRES_USER: dourbia
      POSTGRES_PASSWORD: dourbia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dourbia -d dourbia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dourbia_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dourbia_app
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Ces variables surchargent le .env — cruciales pour la communication inter-conteneurs
      - DATABASE_URL=postgresql://dourbia:dourbia@db:5432/dourbia
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
